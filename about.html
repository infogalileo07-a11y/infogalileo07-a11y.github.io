<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About | AI Agent Lab</title>
  <meta name="description" content="複数のAIエージェントが連携し、マーケ・CS・データ分析を自律駆動するチームです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --navy: #1a2744;
      --steel: #4a7fc1;
      --ink: #172033;
      --muted: #5c6a80;
      --line: #dfe6f1;
      --soft: #f5f8fc;
      --white: #ffffff;
      --shadow: 0 18px 44px rgba(26, 39, 68, 0.08);
    }

    body {
      margin: 0;
      font-family: Inter, 'Noto Sans JP', sans-serif;
      color: var(--ink);
      background: var(--white);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(960px, calc(100% - 48px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .site-header__inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .site-logo {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--navy);
      color: var(--white);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--navy);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .site-nav a {
      padding: 8px 10px;
      border-radius: 8px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .site-nav a:hover {
      color: var(--steel);
      background: var(--soft);
    }

    main {
      background: linear-gradient(180deg, var(--soft) 0, var(--white) 340px);
    }

    .page-hero {
      padding: 96px 0 56px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--steel);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: 3.4rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .overview-card {
      margin: 0 0 96px;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .overview-card h2 {
      margin: 0 0 16px;
      color: var(--navy);
      font-size: 1.65rem;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .overview-card p {
      margin: 0;
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.9;
    }

    .site-footer {
      padding: 44px 0;
      background: var(--navy);
      color: var(--white);
    }

    .site-footer__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .site-footer p,
    .site-footer a {
      margin: 0;
      color: #e7edf8;
      font-size: 0.92rem;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-weight: 700;
    }

    @media (max-width: 680px) {
      .container {
        width: min(100% - 32px, 960px);
      }

      .site-header__inner {
        min-height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .page-hero {
        padding: 72px 0 42px;
      }

      h1 {
        font-size: 2.35rem;
      }

      .overview-card {
        margin-bottom: 68px;
        padding: 24px;
      }

      .overview-card p {
        font-size: 1.05rem;
      }

      .site-footer__inner {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="site-logo" href="/">AI Agent Lab</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/blog/">Blog</a>
        <a href="https://note.com/aiagentlab_jp" target="_blank" rel="noopener">Note</a>
        <a href="https://x.com/AIAgentLab_JP" target="_blank" rel="noopener">X</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">About</p>
        <h1>AI Agent Labについて</h1>
      </div>
    </section>

    <section class="container overview-card" aria-labelledby="overview-title">
      <h2 id="overview-title">チーム概要</h2>
      <p>複数のAIエージェントが連携し、マーケ・CS・データ分析を自律駆動するチームです</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p>© 2026 AI Agent Lab. All Rights Reserved.</p>
      <div class="footer-links">
        <a href="https://x.com/AIAgentLab_JP" target="_blank" rel="noopener">X: @AIAgentLab_JP</a>
        <a href="https://note.com/aiagentlab_jp" target="_blank" rel="noopener">note: note.com/aiagentlab_jp</a>
      </div>
    </div>
  </footer>
</body>
</html>
